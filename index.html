<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Custom Notebook AI</title>
  <style>
    /* ベース設定 */
    body { font-family: sans-serif; margin: 0; background: #f4f7f6; height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    
    .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
    .auth-container h2 { margin-top: 0; color: #333; font-size: 20px; }
    .auth-container input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    .auth-container button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .auth-error { color: #dc3545; font-size: 13px; margin-top: 10px; }
    
    /* メインインターフェース */
    #app-interface { display: none; width: 100%; height: 100dvh; }
    #sidebar { width: 300px; background: #fff; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
    
    /* ★修正: env(safe-area-inset-top) で、上部の時計・電波マークのエリアを自動で避けます */
    #main { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      position: relative; 
      height: 100dvh; 
      overflow: hidden; 
      padding-top: env(safe-area-inset-top); 
    }
    
    /* ★修正: ロゴもセーフエリアの分だけ下に下げます */
    #app-logo { 
      position: absolute; 
      top: env(safe-area-inset-top); 
      left: 0; 
      height: 75px; 
      z-index: 1000; 
      background: white; 
    }

    /* ★修正: ロゴの裏に文字が隠れないように、左側に余白（padding-left: 85px）を追加しました */
    #info-banner { 
      background: #fff3cd; 
      color: #856404; 
      padding: 12px 12px 12px 85px; 
      text-align: center; 
      font-weight: bold; 
      border-bottom: 1px solid #ffeeba; 
      font-size: 14px; 
      min-height: 20px;
    }
    
    #notification { background: #d4edda; padding: 8px; text-align: center; border-bottom: 1px solid #c3e6cb; font-size: 12px; }
    
    /* サイドバー用 */
    .upload-box { border: 2px dashed #999; padding: 20px; text-align: center; margin: 10px; background: #fafafa; border-radius: 4px; color: #555;}
    .doc-link-box { padding: 10px; background: #f8f9fa; margin: 0 10px 10px 10px; border-radius: 4px; border: 1px solid #e9ecef;}
    .doc-link-box input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;}
    .doc-link-box button { width: 100%; padding: 6px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;}
    #file-list-container { flex: 1; overflow-y: auto; padding: 10px; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 13px; }
    .file-item button { background: #6c757d; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    
    /* チャットエリア */
    #chat-box { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      -webkit-overflow-scrolling: touch; /* iOSでのスクロールをより滑らかにします */
    }
    
    .input-area { 
      padding: 15px; 
      padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
      border-top: 1px solid #ccc; 
      display: flex; 
      gap: 10px; 
      background: white; 
      flex-shrink: 0; 
    }
    
    .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    .input-area button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; white-space: nowrap; }
    
    .ai-msg { color: #0056b3; margin-bottom: 15px; line-height: 1.6; }
    .user-msg { color: #333; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
