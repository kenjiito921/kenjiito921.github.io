<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Notebook AI</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f7f6; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
    .auth-container h2 { margin-top: 0; color: #333; font-size: 20px; }
    .auth-container input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .auth-container button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .auth-error { color: #dc3545; font-size: 13px; margin-top: 10px; }
    
    #app-interface { display: none; width: 100%; height: 100vh; }
    #sidebar { width: 300px; background: #fff; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
    
    #main { flex: 1; display: flex; flex-direction: column; position: relative; }
    
    /* ロゴのスタイル（左上に固定配置） */
    #app-logo {
      position: absolute;
      top: 0;
      left: 0;
      height: 75px; 
      z-index: 1000;
      background: white;
    }

    #info-banner { background: #fff3cd; color: #856404; padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid #ffeeba; font-size: 14px; }
    #notification { background: #d4edda; padding: 8px; text-align: center; border-bottom: 1px solid #c3e6cb; font-size: 12px; }
    
    .upload-box { border: 2px dashed #999; padding: 20px; text-align: center; margin: 10px; background: #fafafa; border-radius: 4px; color: #555;}
    
    .doc-link-box { padding: 10px; background: #f8f9fa; margin: 0 10px 10px 10px; border-radius: 4px; border: 1px solid #e9ecef;}
    .doc-link-box input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;}
    .doc-link-box button { width: 100%; padding: 6px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;}
    
    #file-list-container { flex: 1; overflow-y: auto; padding: 10px; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 13px; }
    .file-item button { background: #6c757d; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; }
    .input-area { padding: 15px; border-top: 1px solid #ccc; display: flex; gap: 10px; background: white; }
    .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .input-area button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    .ai-msg { color: #0056b3; margin-bottom: 15px; line-height: 1.6; }
    .user-msg { color: #333; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body onload="checkGuestModeAndInit()">

<div id="auth-screen" class="auth-container" style="display:none;">
  <h2 id="auth-title">ログインが必要です</h2>
  <div id="mode2-inputs" style="display:none;">
    <input type="password" id="common-pass" placeholder="共通パスワードを入力...">
  </div>
  <div id="mode4-inputs" style="display:none;">
    <p style="font-size:12px; color:gray; margin:0;">※初回アクセス時は入力した値で自動登録されます</p>
    <input type="text" id="user-id" placeholder="ユーザーID（自由）">
    <input type="password" id="user-pass" placeholder="パスワード（自由）">
  </div>
  <button onclick="submitAuth()">認証する</button>
  <div id="auth-error-msg" class="auth-error"></div>
</div>

<div id="app-interface">
  <div style="display: flex; height: 100vh; width: 100%;">
    <div id="sidebar">
      <div class="upload-box" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
        PDFをここにドロップして<br>アップロード
      </div>
      
      <div class="doc-link-box">
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #333;">Googleドキュメントを連携</div>
        <input type="text" id="doc-url" placeholder="ドキュメントのURLをペースト...">
        <button onclick="addGoogleDoc()">追加</button>
      </div>

      <div style="padding: 10px; font-weight: bold; font-size: 14px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: 1px solid #eee;">管理中のファイル一覧</div>
      <div id="file-list-container">
        <div id="file-list">読み込み中...</div>
      </div>
    </div>
    <div id="main">
      
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADUAAAA2CAYAAABnctHeAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAA/TSURBVGhD7VoJUJRHFp4LZhAUUNCNOUyMRlHjbaJJVnMYIkoS3dpsks3GdTUpY0yM2dWoFZVTGAgLiCDKYbgRUBAk8Y5KjFHjDcphhCCHG+Uabmbmn2/r9T89zoxg4spau1v7qrr46f67//76vff169cjwf+gSKwr/hfk/6D+W+T/oO6HGAyGbgsXnU4HQRDEdwUD9Hq96X8u/5GgBL3AJmsOhsvx48fx3XffsWd6jwoMYj8u9wVUd5Nj0k01vUuASCNarZY9m8uaNWvg4+NjUUfv3VdQfJJdXV04e/Ys9u/fj2vXrrE2Mhu20lbCAdXX12P79u04dOgQe7elpQUjRozAu+++y95rb2tH3u487M7fzfpwuS+g6IMbN27EoEGDIJFIMH78eHzzzTdiu2CpLnqfAGm7tKxtz549eOKJJ/Dmm2/C398fNjY2GDp0KAICAjDrlVmYNGkSLl++bDHGvx0UCX300UcfZYB4eeONN9DZ2Wn9quhTpEFBMJlUdHQ0FAoF6yeXyyGTydizk5MTdu3aZT3E/QFFju3o6GiaFP11d3dHe3s7a7f2OW6yXM6cOYMJEyZY9Kfy8ssv4/r16xb9SO4LKI1Gg3nz5pkmQxMLCQlhbWRiXCvmhXyQNOzn54eRI0ea+pKWpFKpSVvPPfccIiMjUVFRYfper4DiE7uT/PzzzwgNDcVHH32ElJQUNDY2QqfVMd8hn2P7DVG0ILD65uZmZGdn46233mILMnPmTPTt29cEjkzv9ddfZ2XBnxcwMiFfJLlnUDQJWlUSYqfDhw8jPDwc69evx+rVq5lzx8XGoaCgAFevXkVdXZ31ED1KbW0tKwQ6KyuLgXJ2doaDgwMeeughnD9/nrW1tbWho73DtLfdMyjOXmVlZXj77behUqlMq8mLra0t+vXrh+HDh+PVV1/FqlWrGBsSvRcVFaG8vBw3btxAY0Mjqquqce7cOSQnJyM2NhZVVVVsfFocGoPAhYWFwcXFhT3fmoi4wL0CiqSyshLTp09ntj5kyBBm57Nnz8bkyZMtHNu6kAkR0LFjx2La1GlsDCKEqVOnYsWKFTh56iRbNNLG8uXLmfZJ6P9ly5Zh5cqVt7Flr4BqbW3FunXr2D6yd99e1NTUoKGhgZnigQMHmLlwciBaJgcfNWoUXnjhBYwZM4aZERU3Nzc8//zz+Pjjj3HkyBFmUlxoE6Y68kPuu7SBHzx48FYcaEYy9wyKKHXfvn0MnLXEb4tnmyUHRZp0HejKzI6IgDRcUlKC0rJSVNdUo6Ojw6I/14BeK9I7j0xoK+CkwNqNQW2vmh+JXneLvUjIRN750zsmU+MUvHTpUuuut4n5qrOJ6sUgl0UaWi0DRuOTNRCrcuEs2mugOK1zUIVFhcy/zAENGzYMe/fuZURQXFzM9i8Sc3/oqbAgl7YAIzCqo/4RERHYsmULM1ESAtZroEjMQW2K2GRBEsSKXl5ebJ96+OGH8eSTT7L9h8IcmiCJNRDzQpqiCXNgPIAlvxowYAA8PT0ZxZP0KiguTU1NmDNnjgXTvfTSSwyQNQMS2xG5kJC2WekGFAMm0AFRbzyaiHsSPXt4eJjGoi3i3wKKTIz2FD5xYrf4+Hi89957LKqmPYa3TZ8+g5EGE0FnAiYYBFYMBjoEslMgBHRBMOhgMPoutwq1Wm0aj+LBXgPFTYiceOHChRbaoEMd1ZMPXKusxO7deZg4cSLkMhkSExPFAQQdoO8UAYh7KcQ4RRQyNi26oBe6ADNQVCg+5N+yt7fvPVCcYo8dO2ahCdq/uBNzEQwGBnzRwoXQ6nToZBtsJwxdGrRru3C9rQtlrR0o6ujEj62dKG5sR027Tg       <div id="info-banner">お知らせを取得中...</div>
      <div id="notification">準備完了。</div>
      <div id="chat-box"><div id="chat-log"></div></div>
      <div class="input-area">
        <input type="text" id="user-input" placeholder="質問を入力してください...">
        <button onclick="sendMessage()" id="send-btn">送信</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ------------------------------------------------------------------
  // ★設定項目：あなたのGAS「ウェブアプリURL」に書き換えてください
  // ------------------------------------------------------------------
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxDY4wS367_yPavGliWNITlAe-3v3RqTwwFPnHpcDXOPk47Me2XGhWoq3Zpf-CzfByz2w/exec";

  let currentMode = "1";
  let userIdentifier = "Anonymous";
  let isGuestMode = false;

  // 共通のAPI呼出関数（iPhoneのサードパーティ制限を完全にバイパスします）
  async function callApi(data) {
    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'text/plain' }, // プリフライト(OPTIONS)回避
        redirect: 'follow' // GASのリダイレクト追従に必須
      });
      return await response.json();
    } catch (error) {
      console.error("API通信エラー:", error);
      document.getElementById('notification').innerText = "通信エラーが発生しました。";
      return { success: false, message: "通信に失敗しました。" };
    }
  }

  function getBrowserId() {
    let id = localStorage.getItem('user_browser_id');
    if (!id) {
      id = 'UID_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
      localStorage.setItem('user_browser_id', id);
    }
    return id;
  }

  // 起動時にゲストモードと初期設定をチェック
  async function checkGuestModeAndInit() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('guest') === 'true') {
      isGuestMode = true;
      document.getElementById('sidebar').style.display = 'none'; // サイドバーを完全に消去
    }
    
    initializeConfig();
  }

  async function initializeConfig() {
    const config = await callApi({ action: "getConfig" });
    if (!config || !config.authMode) return;

    currentMode = config.authMode;
    document.getElementById('info-banner').innerText = config.info;
    
    if (currentMode === "1") {
      userIdentifier = "NoAuth_" + getBrowserId();
      showMainInterface();
    } else if (currentMode === "2") {
      document.getElementById('auth-screen').style.display = 'block';
      document.getElementById('mode2-inputs').style.display = 'block';
    } else if (currentMode === "4") {
      document.getElementById('auth-screen').style.display = 'block';
      document.getElementById('mode4-inputs').style.display = 'block';
    }
  }

  async function submitAuth() {
    const errorDiv = document.getElementById('auth-error-msg');
    errorDiv.innerText = "";

    if (currentMode === "2") {
      const pass = document.getElementById('common-pass').value;
      const isValid = await callApi({ action: "checkCommonPassword", password: pass });
      if (isValid) {
        userIdentifier = "Common_" + getBrowserId();
        showMainInterface();
      } else {
        errorDiv.innerText = "パスワードが正しくありません。";
      }
    } else if (currentMode === "4") {
      const uid = document.getElementById('user-id').value;
      const docPass = document.getElementById('user-pass').value;
      const result = await callApi({ action: "loginOrCreateUser", userId: uid, password: docPass });
      if (result.success) {
        userIdentifier = uid;
        showMainInterface();
        if(result.isNew) alert("新規ユーザーとして登録・ログインしました。");
      } else {
        errorDiv.innerText = result.message;
      }
    }
  }

  function showMainInterface() {
    document.getElementById('auth-screen').style.display = 'none';
    document.body.style.display = 'block';
    document.getElementById('app-interface').style.display = 'flex';
    loadFiles();
  }

  async function loadFiles() {
    if (isGuestMode) return; // ゲストモードならファイル一覧の取得処理自体をスキップ

    const res = await callApi({ action: "getList" });
    const container = document.getElementById('file-list');
    
    if (!res.files || res.files.length === 0) {
      container.innerHTML = "<span style='color:gray; font-size: 12px;'>連携中のファイルがありません</span>";
      return;
    }
    
    let html = '';
    res.files.forEach(f => {
      html += `<div class="file-item">
                 <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;" title="${f.name}">${f.name}</span>
                 <button onclick="removeFile('${f.id}', ${f.row})">解除</button>
               </div>`;
    });
    container.innerHTML = html;
  }

  async function removeFile(id, rowNum) {
    document.getElementById('notification').innerText = "リストから解除中...";
    const res = await callApi({ action: "delete", fileId: id, row: rowNum });
    if (res.success) {
      document.getElementById('notification').innerText = "解除完了";
      loadFiles();
    }
  }

  function handleDrop(e) {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    document.getElementById('notification').innerText = "アップロード中: " + file.name;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const res = await callApi({ action: "upload", fileData: e.target.result, fileName: file.name });
      if (res.success) {
        document.getElementById('notification').innerText = "アップロード完了: " + file.name;
        loadFiles();
      }
    };
    reader.readAsDataURL(file);
  }

  async function addGoogleDoc() {
    const url = document.getElementById('doc-url').value;
    if (!url) return;
    document.getElementById('notification').innerText = "ドキュメントを連携中...";
    
    const res = await callApi({ action: "registerDoc", url: url });
    if (res.success) {
      document.getElementById('notification').innerText = "連携完了: " + res.fileName;
      document.getElementById('doc-url').value = ""; 
      loadFiles();
    } else {
      alert(res.message);
      document.getElementById('notification').innerText = "連携失敗";
    }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const log = document.getElementById('chat-log');
    const query = input.value;
    if (!query) return;

    log.innerHTML += "<div class='user-msg'>あなた: " + query + "</div>";
    input.value = "";
    btn.disabled = true;
    document.getElementById('notification').innerText = "AIが回答を生成中...";

    const res = await callApi({ action: "ask", query: query, identifier: userIdentifier });
    
    if (res.success) {
      log.innerHTML += "<div class='ai-msg'>AI: " + res.answer.replace(/\n/g, '<br>') + "</div>";
    } else {
      log.innerHTML += "<div class='ai-msg' style='color:red;'>AI: エラーが発生しました。</div>";
    }
    
    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    document.getElementById('notification').innerText = "回答完了";
    btn.disabled = false;
  }
</script>
</body>
</html>
