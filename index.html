<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Custom Notebook AI</title>
  <style>
    html, body { height: 100%; height: -webkit-fill-available; margin: 0; padding: 0; background: #f4f7f6; font-family: sans-serif; overflow: hidden; }
    
    .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .auth-container h2 { margin-top: 0; color: #333; font-size: 20px; }
    .auth-container input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    .auth-container button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .auth-error { color: #dc3545; font-size: 13px; margin-top: 10px; }
    
    #app-interface { display: none; position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; }
    #sidebar { width: 300px; background: #fff; border-right: 1px solid #ccc; display: flex; flex-direction: column; height: 100%; }
    #main { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }
    
    #header-container { position: relative; flex-shrink: 0; padding-top: env(safe-area-inset-top); background: #fff3cd; border-bottom: 1px solid #c3e6cb; z-index: 10; }
    #app-logo { position: absolute; top: env(safe-area-inset-top); left: 0; bottom: 0; width: 80px; object-fit: contain; background: white; z-index: 11; }
    #info-banner { background: #fff3cd; color: #856404; padding: 12px 10px 12px 85px; text-align: center; font-weight: bold; font-size: 14px; border-bottom: 1px solid #ffeeba; min-height: 20px; }
    #notification { background: #d4edda; color: #155724; padding: 8px 10px 8px 85px; text-align: center; font-size: 12px; }
    
    .upload-box { border: 2px dashed #999; padding: 20px; text-align: center; margin: 10px; background: #fafafa; border-radius: 4px; color: #555;}
    .doc-link-box { padding: 10px; background: #f8f9fa; margin: 0 10px 10px 10px; border-radius: 4px; border: 1px solid #e9ecef;}
    .doc-link-box input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 16px;}
    .doc-link-box button { width: 100%; padding: 6px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;}
    #file-list-container { flex: 1; overflow-y: auto; padding: 10px; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 13px; }
    .file-item button { background: #6c757d; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

    #suggestion-container {
      padding: 10px 15px 5px 15px;
      background: white;
      display: none; 
    }
    
    #suggestion-buttons {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    #suggestion-buttons::-webkit-scrollbar { display: none; } 
    
    .suggestion-btn {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 13px;
      color: #495057;
      cursor: pointer;
      flex-shrink: 0;
    }
    .suggestion-btn:hover { background: #e2e6ea; color: #007bff; border-color: #007bff; }
    
    .input-area { padding: 15px; padding-bottom: max(15px, env(safe-area-inset-bottom)); border-top: 1px solid #ccc; display: flex; gap: 10px; background: white; flex-shrink: 0; }
    .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    .input-area button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; white-space: nowrap; }
    
    .ai-msg { color: #0056b3; margin-bottom: 15px; line-height: 1.6; }
    .user-msg { color: #333; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body onload="checkGuestModeAndInit()">

<div id="auth-screen" class="auth-container" style="display:none;">
  <h2 id="auth-title">ログインが必要です</h2>
  <div id="mode2-inputs" style="display:none;"><input type="password" id="common-pass" placeholder="共通パスワードを入力..."></div>
  
  <div id="mode4-inputs" style="display:none;">
    <p style="font-size:11px; color:#666; margin:0 0 10px 0; text-align:left; line-height:1.4;">
      ※ 初回アクセス時は入力した値で自動登録されます。<br>
      ※ ご入力いただくメールアドレスは、本サービスの利用に限る目的のもとで登録・管理されます。
    </p>
    <input type="email" id="user-id" placeholder="メールアドレス">
    <input type="password" id="user-pass" placeholder="パスワード（自由）">
  </div>
  
  <button onclick="submitAuth()">認証する</button>
  <div id="auth-error-msg" class="auth-error"></div>
</div>

<div id="app-interface">
  <div id="sidebar">
    <div class="upload-box" ondrop="handleDrop(event)" ondragover="event.preventDefault()">PDFをここにドロップ<br>アップロード</div>
    <div class="doc-link-box">
      <div style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Googleドキュメント連携</div>
      <input type="text" id="doc-url" placeholder="URL...">
      <button onclick="addGoogleDoc()">追加</button>
    </div>
    <div style="padding: 10px; font-weight: bold; font-size: 14px; background: #f8f9fa;">管理中のファイル</div>
    <div id="file-list-container"><div id="file-list">読み込み中...</div></div>
  </div>
  
  <div id="main">
    <div id="header-container">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADUAAAA2CAYAAABnctHeAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAA/TSURBVGhD7VoJUJRHFp4LZhAUUNCNOUyMRlHjbaJJVnMYIkoS3dpsks3GdTUpY0yM2dWoFZVTGAgLiCDKYbgRUBAk8Y5KjFHjDcphhCCHG+Uabmbmn2/r9T89zoxg4spau1v7qrr46f67//76vff169cjwf+gSKwr/hfk/6D+W+T/oO6HGAyGbgsXnU4HQRDEdwUD9Hq96X8u/5GgBL3AJmsOhsvx48fx3XffsWd6jwoMYj8u9wVUd5Nj0k01vUuASCNarZY9m8uaNWvg4+NjUUfv3VdQfJJdXV04e/Ys9u/fj2vXrrE2Mhu20lbCAdXX12P79u04dOgQe7elpQUjラグウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウウ` id="app-logo" alt="Logo">
      <div id="info-banner">お知らせを取得中...</div>
      <div id="notification">準備完了。</div>
    </div>
    
    <div id="chat-box"><div id="chat-log"></div></div>
    
    <div id="suggestion-container">
      <div id="suggestion-buttons"></div>
    </div>
    
    <div class="input-area">
      <input type="text" id="user-input" placeholder="質問を入力してください...">
      <button onclick="sendMessage()" id="send-btn">送信</button>
    </div>
  </div>
</div>

<script>
  // ★設定：新しいGASのURLを貼り付け
  const GAS_URL = "[https://script.google.com/macros/s/AKfycbyLSOkIX95ZW-BXjwyEefTx3CbT14VaW5GyHfYep-w1W5Byrs1Y6Hz2RDmAXuL5uHZU5A/exec](https://script.google.com/macros/s/AKfycbyLSOkIX95ZW-BXjwyEefTx3CbT14VaW5GyHfYep-w1W5Byrs1Y6Hz2RDmAXuL5uHZU5A/exec)";

  let currentMode = "1";
  let userIdentifier = "Anonymous";
  let isGuestMode = false;

async function callApi(data) {
    try {
      const formData = new URLSearchParams();
      formData.append('data', JSON.stringify(data));
      const response = await fetch(GAS_URL, { 
        method: 'POST', 
        body: formData, 
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
        redirect: 'follow' 
      });
      return await response.json();
    } catch (e) {
      document.getElementById('notification').innerText = "通信エラー発生"; 
      return { success: false };
    }
  }

  function getBrowserId() {
    let id = localStorage.getItem('user_browser_id');
    if (!id) { id = 'UID_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now(); localStorage.setItem('user_browser_id', id); }
    return id;
  }

  async function checkGuestModeAndInit() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('guest') === 'true' || urlParams.get('guest') === 'true/') { isGuestMode = true; document.getElementById('sidebar').style.display = 'none'; }
    initializeConfig();
  }

  async function initializeConfig() {
    const config = await callApi({ action: "getConfig" });
    if (!config || !config.authMode) return;
    currentMode = config.authMode;
    document.getElementById('info-banner').innerText = config.info;
    
    if (currentMode === "1") { userIdentifier = "NoAuth_" + getBrowserId(); showMainInterface(); } 
    else if (currentMode === "2") { document.getElementById('auth-screen').style.display = 'block'; document.getElementById('mode2-inputs').style.display = 'block'; } 
    else if (currentMode === "4") { document.getElementById('auth-screen').style.display = 'block'; document.getElementById('mode4-inputs').style.display = 'block'; }
  }

  async function submitAuth() {
    const err = document.getElementById('auth-error-msg'); err.innerText = "";
    if (currentMode === "2") {
      const res = await callApi({ action: "checkCommonPassword", password: document.getElementById('common-pass').value });
      if (res && res.success) { userIdentifier = "Common_" + getBrowserId(); showMainInterface(); } else err.innerText = "パスワードが違います";
    } else if (currentMode === "4") {
      const uid = document.getElementById('user-id').value, pwd = document.getElementById('user-pass').value;
      const res = await callApi({ action: "loginOrCreateUser", userId: uid, password: pwd });
      if (res.success) { userIdentifier = uid; showMainInterface(); if(res.isNew) alert("新規登録・ログインしました"); } else err.innerText = res.message;
    }
  }

  function showMainInterface() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-interface').style.display = 'flex';
    loadFiles();
  }

  async function loadFiles() {
    if (!isGuestMode) {
      const res = await callApi({ action: "getList" });
      const container = document.getElementById('file-list');
      if (!res.files || res.files.length === 0) container.innerHTML = "<span style='color:gray; font-size: 12px;'>連携中のファイルなし</span>";
      else {
        let html = ''; res.files.forEach(f => { html += `<div class="file-item"><span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;" title="${f.name}">${f.name}</span><button onclick="removeFile('${f.id}', ${f.row})">解除</button></div>`; });
        container.innerHTML = html;
      }
    }
    generateSuggestions(null, null);
  }

  async function generateSuggestions(lastQ, lastA) {
    const container = document.getElementById('suggestion-container');
    const btnArea = document.getElementById('suggestion-buttons');
    container.style.display = 'block';
    btnArea.innerHTML = '<span style="font-size:12px; color:#007bff; padding: 5px;">✨ 次の質問を考えています...</span>';
    
    const res = await callApi({ action: "getSuggestions", lastQ: lastQ, lastA: lastA });
    if (res && res.success && res.suggestions) {
      btnArea.innerHTML = '';
      res.suggestions.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'suggestion-btn';
        btn.innerText = "✨ " + text;
        btn.onclick = () => sendSuggestion(text);
        btnArea.appendChild(btn);
      });
      document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    } else {
      container.style.display = 'none';
    }
  }

  async function removeFile(id, rowNum) {
    document.getElementById('notification').innerText = "解除中...";
    const res = await callApi({ action: "delete", fileId: id, row: rowNum });
    if (res && res.success) { document.getElementById('notification').innerText = "解除完了"; loadFiles(); }
  }

  function handleDrop(e) {
    e.preventDefault(); const file = e.dataTransfer.files[0];
    document.getElementById('notification').innerText = "アップロード中...";
    const reader = new FileReader();
    reader.onload = async (e) => {
      const res = await callApi({ action: "upload", fileData: e.target.result, fileName: file.name });
      if (res && res.success) { document.getElementById('notification').innerText = "アップロード完了"; loadFiles(); }
    }; reader.readAsDataURL(file);
  }

  async function addGoogleDoc() {
    const url = document.getElementById('doc-url').value; if (!url) return;
    document.getElementById('notification').innerText = "ドキュメント連携中...";
    const res = await callApi({ action: "registerDoc", url: url });
    if (res && res.success) { document.getElementById('notification').innerText = "連携完了"; document.getElementById('doc-url').value = ""; loadFiles(); }
    else { alert(res.message); document.getElementById('notification').innerText = "連携失敗"; }
  }

  function sendSuggestion(text) {
    document.getElementById('user-input').value = text;
    document.getElementById('suggestion-container').style.display = 'none'; 
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const log = document.getElementById('chat-log');
    const query = input.value; if (!query) return;

    log.innerHTML += "<div class='user-msg'>あなた: " + query + "</div>";
    input.value = ""; btn.disabled = true;
    document.getElementById('notification').innerText = "AIが回答を生成中...";
    document.getElementById('suggestion-container').style.display = 'none'; 

    const res = await callApi({ action: "ask", query: query, identifier: userIdentifier });
    
    if (res && res.success) {
      log.innerHTML += "<div class='ai-msg'>AI: " + res.answer.replace(/\n/g, '<br>') + "</div>";
      document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
      generateSuggestions(query, res.answer);
    } else {
      log.innerHTML += "<div class='ai-msg' style='color:red;'>AI: エラーが発生しました。</div>";
    }
    
    document.getElementById('notification').innerText = "回答完了"; btn.disabled = false;
  }
</script>
</body>
</html>
